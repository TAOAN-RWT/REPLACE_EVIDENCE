<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Teknisi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; padding: 15px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, select, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px; margin-top: 20px; border-radius: 5px;}
  </style>
</head>
<body>

  <h2>Laporan Pekerjaan</h2>
  <form id="formTeknisi">
    <label>Mode Pengisian:</label>
    <select id="modeIsi" required disabled>
      <option value="">-- Sedang Memuat Data... Tunggu ya --</option>
      <option value="self">Diri Sendiri (Auto Check ID Telegram)</option>
      <option value="manual">Manual</option>
    </select>

    <label>NIK Teknisi:</label>
    <input type="text" id="nik" list="nikList" placeholder="Ketik NIK atau pilih..." required disabled autocomplete="off">
    <datalist id="nikList"></datalist>

    <label>Nama Teknisi:</label>
    <input type="text" id="nama" required readonly>

    <label>Branch:</label>
    <input type="text" id="branch" required readonly>

    <label>SA:</label>
    <input type="text" id="sa" required readonly>

    <label>Tanggal Pekerjaan:</label>
    <input type="date" id="tanggal" required>

    <label>No Internet:</label>
    <input type="text" id="noInet" required>

    <label>Jenis Pekerjaan:</label>
    <select id="jenisPekerjaan" required>
      <option value="">-- Pilih --</option>
      <option value="Replacement P1">Replacement P1</option>
      <option value="Replacement Exclude P1">Replacement Exclude P1</option>
    </select>

    <label>Jenis Teknisi:</label>
    <select id="jenisTeknisi" required>
      <option value="">-- Pilih --</option>
      <option value="Freelance">Freelance</option>
      <option value="Dedicated">Dedicated</option>
      <option value="Kemitraan">Kemitraan</option>
      <option value="Insoruce">Insoruce</option>
    </select>

    <label>Eviden Pekerjaan (Maks 3):</label>
    <input type="file" id="fotoPekerjaan" accept="image/*" multiple required>
    <small id="fotoPekerjaanInfo"></small>

    <label>Eviden Dengan Pelanggan (Maks 1):</label>
    <input type="file" id="fotoPelanggan" accept="image/*" required>

    <label>Eviden BAST + BA RTWH (Maks 1):</label>
    <input type="file" id="fotoBAST" accept="image/*" required>

    <label>Keterangan:</label>
    <input type="text" id="keterangan" placeholder="Kasih noted jika ada eviden yang kurang" required>

    <button type="submit" id="btnSubmit">Submit Laporan</button>
  </form>

 <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const tgId = tg.initDataUnsafe?.user?.id?.toString() || ""; 

    let dbData = [];
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxYx2YJaBqqS1HrSYtdUHRLwVHrITDYBrdBT4tVtmQ7IyaAmLRWeySzdE-yTQbKaTg4/exec"; // MASUKKAN URL GAS DO_GET DISINI

   const modeIsi = document.getElementById("modeIsi");
    const inputNik = document.getElementById("nik");
    const datalistNik = document.getElementById("nikList");
    const namaField = document.getElementById("nama");
    const branchField = document.getElementById("branch");
    const saField = document.getElementById("sa");// Fetch DB saat web dibuka
    fetch(GAS_URL)
      .then(async (res) => {
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
          throw new TypeError("URL GAS tidak merespons dengan benar. Pastikan akses GAS sudah 'Anyone'.");
        }
        return res.json();
      })
      .then(data => {
        dbData = data;
        // Buka kunci dropdown kalau data sukses masuk
        modeIsi.options[0].text = "-- Pilih Mode --";
        modeIsi.disabled = false; 
      })
      .catch(err => {
        alert("Gagal menarik data dari Database! \n\n" + err.message);
        modeIsi.options[0].text = "-- Gagal Memuat Data --";
      });

    // Logika Diri Sendiri vs Manual
    modeIsi.addEventListener("change", (e) => {
      // Reset form setiap kali mode diganti
      inputNik.value = "";
      datalistNik.innerHTML = "";
      inputNik.disabled = false;
      
      namaField.value = ""; branchField.value = ""; saField.value = "";
      namaField.readOnly = false; branchField.readOnly = false; saField.readOnly = false;
      
      if (e.target.value === "self") {
        
        // 1. Cek apakah koneksi ke GAS sudah berhasil bawa data
        if (dbData.length === 0) {
          alert("Sabar, data dari database sedang ditarik. Coba klik lagi dalam beberapa detik!");
          e.target.value = ""; // Reset pilihan
          return;
        }

        // 2. Cek apakah ID Telegram terdeteksi
        if (!tgId || tgId === "") {
          alert("ID Telegram tidak terdeteksi! Pastikan kamu membuka form ini dari DALAM aplikasi Telegram.");
          e.target.value = "";
          return;
        }

        // 3. Pencarian ekstra ketat
        const myData = dbData.find(row => String(row.tgId).trim() === String(tgId).trim());
        
        if (myData) {
          inputNik.value = myData.nik;
          autoFill(myData.nik);
          // Kunci semua form karena mode Diri Sendiri
          inputNik.readOnly = true;
          namaField.readOnly = true; branchField.readOnly = true; saField.readOnly = true;
        } else {
          alert("ID Telegram kamu (" + tgId + ") belum terdaftar di database Kolom E.");
          e.target.value = "";
          inputNik.disabled = true;
        }
        
      } else if (e.target.value === "manual") {
        inputNik.readOnly = false;
        // Isi datalist dengan semua data NIK sebagai autocomplete
        dbData.forEach(row => {
          if (row.nik) {
            datalistNik.innerHTML += `<option value="${row.nik}">${row.nama}</option>`;
          }
        });
      }
    });

    // Fitur Auto-Search saat NIK diketik
    inputNik.addEventListener("input", (e) => {
      if (modeIsi.value === "manual") {
        const val = e.target.value;
        const data = dbData.find(row => String(row.nik).trim() === String(val).trim());
        
        if (data) {
          // Kalau NIK yang diketik ADA di DB -> Autofill & Kunci
          namaField.value = data.nama;
          branchField.value = data.branch;
          saField.value = data.sa;
          namaField.readOnly = true; branchField.readOnly = true; saField.readOnly = true;
        } else {
          // Kalau NIK TIDAK ADA di DB -> Buka kunci agar bisa diketik manual
          namaField.readOnly = false; branchField.readOnly = false; saField.readOnly = false;
        }
      }
    });

    function autoFill(nik) {
      const data = dbData.find(row => String(row.nik).trim() === String(nik).trim());
      if (data) {
        namaField.value = data.nama;
        branchField.value = data.branch;
        saField.value = data.sa;
      }
    }

    // Validasi file upload (maks 3)
    document.getElementById("fotoPekerjaan").addEventListener("change", function() {
      if (this.files.length > 3) {
        alert("Maksimal 3 foto untuk Eviden Pekerjaan!");
        this.value = ""; 
      }
    });

    // --- FUNGSI BARU: IMAGE COMPRESSOR ---
    const compressImage = (file, maxWidth = 1024, quality = 0.7) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // Kalkulasi rasio agar proporsional
            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // Convert ke Base64 dengan kompresi JPEG
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    };
    // -------------------------------------

    // Handle Submit
    document.getElementById("formTeknisi").addEventListener("submit", async (e) => {
      e.preventDefault();
      document.getElementById("btnSubmit").innerText = "Mengompres & Mengirim... Tunggu ya";
      document.getElementById("btnSubmit").disabled = true;

      try {
        // Proses Kompresi Foto
        const filesPekerjaan = document.getElementById("fotoPekerjaan").files;
        let b64Pekerjaan = [];
        for (let file of filesPekerjaan) {
            b64Pekerjaan.push(await compressImage(file)); // Gunakan fungsi compress
        }
        
        const b64Pelanggan = await compressImage(document.getElementById("fotoPelanggan").files[0]);
        const b64BAST = await compressImage(document.getElementById("fotoBAST").files[0]);

       const payload = {
          tgId: tgId, // <--- TAMBAHAN BARU INI (Kirim ID Telegram user)
          nik: document.getElementById("nik").value,
          nama: document.getElementById("nama").value,
          branch: document.getElementById("branch").value,
          sa: document.getElementById("sa").value,
          tanggal: document.getElementById("tanggal").value,
          noInet: document.getElementById("noInet").value,
          jenisPekerjaan: document.getElementById("jenisPekerjaan").value,
          jenisTeknisi: document.getElementById("jenisTeknisi").value,
          keterangan: document.getElementById("keterangan").value,
          fotoPekerjaan: b64Pekerjaan,
          fotoPelanggan: b64Pelanggan,
          fotoBAST: b64BAST
        };

       // Kirim ke Vercel API backend
        const res = await fetch("/api/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        // --- INI BAGIAN YANG DIUBAH (PENANGKAP ERROR CERDAS) ---
        const data = await res.json(); // Baca isi balasan dari server
        
        if (!res.ok || data.success === false) {
          // JIKA SERVER MENOLAK (Status bukan 200 atau success bernilai false)
          // Tampilkan alert sesuai alasan penolakan asli dari GAS!
          alert("⚠️ PENOLAKAN SYSTEM:\n" + (data.error || "Terjadi kesalahan."));
        } else {
          // JIKA BENAR-BENAR SUKSES
          alert("📝 LAPORAN BERHASIL!\n\nID Evidence: " + data.id + "\nData sedang mengantre untuk dikirim ke Channel.");
          document.getElementById("formTeknisi").reset(); // Kosongkan form
          tg.close(); // Tutup mini app Telegram
        }
        // --------------------------------------------------------

      } catch (err) {
        alert("❌ ERROR JARINGAN:\n" + err.message);
      } finally {
        document.getElementById("btnSubmit").innerText = "Submit Laporan";
        document.getElementById("btnSubmit").disabled = false;
      }
    });
  </script>
</body>
</html>
